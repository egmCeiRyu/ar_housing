<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Client Portal</title>

<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/client-portal.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script defer src="js/client-portal.js"></script>

</head>

<body>

<main class="portal-shell">

    <section class="portal-hero">

        <div>
            <span class="portal-label">顧客ポータル</span>
            <h1 id="clientName">Loading...</h1>
            <p>
                各プロジェクトのQRコードとアクセス分析を確認できます。
            </p>
        </div>

    </section>

    <section id="clientInfo" class="client-info"></section>

    <section class="projects-section">

        <div class="section-title">
            <h2>プロジェクト一覧</h2>
            <p>各プロジェクトのQRコードとアクセス分析を確認できます。</p>
        </div>

        <div id="projectList" class="portal-project-grid"></div>

    </section>

    <button
        class="back-btn"
        onclick="history.back()">
        ←
    </button>

</main>

</body>
</html>
