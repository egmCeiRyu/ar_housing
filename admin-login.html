<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>管理者ログイン</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/admin-login.css">
</head>

<body>

<div class="login-page">

    <div class="login-card">

        <div class="logo">
            🏠
        </div>

        <div class="page-label">
            AR Housing
        </div>

        <h1>
            管理者ログイン
        </h1>

        <p class="subtitle">
            管理画面へログインしてください。
        </p>

        <input
            id="email"
            type="email"
            placeholder="メールアドレス">

        <div class="password-area">
            <input
                id="password"
                type="password"
                placeholder="パスワード">

            <button
                id="togglePassword"
                type="button">
                表示
            </button>
        </div>

        <button id="loginButton">
            ログイン
        </button>

        <button
            id="forgotPasswordButton"
            class="forgot-password"
            type="button">
            パスワードをお忘れですか？
        </button>

        <div
            id="resetBox"
            class="reset-box hidden">

            <p>
                登録済みのメールアドレスに再設定リンクを送信します。
            </p>

            <button
                id="sendResetButton"
                type="button">
                再設定メールを送信
            </button>

        </div>

        <div
            id="newPasswordBox"
            class="reset-box hidden">

            <p>
                新しいパスワードを入力してください。
            </p>

            <input
                id="newPassword"
                type="password"
                placeholder="新しいパスワード">

            <button
                id="updatePasswordButton"
                type="button">
                パスワードを更新
            </button>

        </div>

        <p id="loginMessage" class="login-message"></p>

        <button
            class="back-home"
            onclick="location.href='home.html'">
            ← ホームへ戻る
        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/admin-login.js"></script>

</body>

</html>
